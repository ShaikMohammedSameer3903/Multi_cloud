<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/app-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- Security Headers for Lighthouse Best Practices -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:* wss:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://login.microsoftonline.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https: wss: http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*; frame-src 'self' https://accounts.google.com https://login.microsoftonline.com;" />
    
    <!-- Primary SEO Metadata -->
    <title>CloudOps Enterprise - Multi-Tenant Azure Management Portal</title>
    <meta name="description" content="Production-grade multi-tenant Azure operations platform with intelligent cost optimization, real-time activity monitoring, automated security compliance, and AI-powered insights." />
    <meta name="keywords" content="Azure, CloudOps, Multi-Tenant, Cloud Management, Cost Optimization, SOC Dashboard, Azure Monitoring, Compliance, FinOps" />
    <link rel="canonical" href="https://multi-cloud-ten.vercel.app" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://multi-cloud-ten.vercel.app" />
    <meta property="og:title" content="CloudOps Enterprise - Azure Cloud Management Portal" />
    <meta property="og:description" content="Production-grade multi-tenant Azure operations platform with intelligent cost optimization, real-time activity monitoring, and AI-powered insights." />
    <meta property="og:image" content="https://multi-cloud-ten.vercel.app/app-icon.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://multi-cloud-ten.vercel.app" />
    <meta property="twitter:title" content="CloudOps Enterprise - Azure Cloud Management Portal" />
    <meta property="twitter:description" content="Production-grade multi-tenant Azure operations platform with intelligent cost optimization, real-time activity monitoring, and AI-powered insights." />
    <meta property="twitter:image" content="https://multi-cloud-ten.vercel.app/app-icon.png" />

    <!-- Structured Data: JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Azure CloudOps Enterprise",
        "operatingSystem": "All",
        "applicationCategory": "BusinessApplication",
        "description": "Production-grade multi-tenant Azure operations platform with intelligent cost optimization and automated security compliance.",
        "offers": {
          "@type": "Offer",
          "price": "0.00",
          "priceCurrency": "USD"
        },
        "publisher": {
          "@type": "Organization",
          "name": "CloudOps Solutions",
          "url": "https://multi-cloud-ten.vercel.app"
        }
      }
    </script>

    <!-- Technical SEO: Prevent indexing of preview deployments dynamically -->
    <script>
      if (window.location.hostname !== 'multi-cloud-ten.vercel.app' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        const meta = document.createElement('meta');
        meta.name = 'robots';
        meta.content = 'noindex, nofollow';
        document.head.appendChild(meta);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
