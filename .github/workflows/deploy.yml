name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build & Deploy Frontend to Azure Static Web Apps
  # ─────────────────────────────────────────────────────────────────────────────
  build_and_deploy_frontend:
    runs-on: ubuntu-latest
    name: Build and Deploy Frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_AZURE_CLIENT_ID: ${{ vars.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ vars.VITE_AZURE_TENANT_ID }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "dist"
          skip_app_build: true
          skip_deploy_on_missing_secrets: true

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Trigger Render Backend Deploy
  # ─────────────────────────────────────────────────────────────────────────────
  deploy_backend_render:
    runs-on: ubuntu-latest
    name: Trigger Render Backend Deploy
    needs: build_and_deploy_frontend

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          echo "=== Triggering Render Production Deploy ==="
          HOOK_URL="${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          if [ -z "$HOOK_URL" ]; then
            echo "[INFO] RENDER_DEPLOY_HOOK_URL not set. Skipping."
            echo "To enable: Render Dashboard > Service > Settings > Deploy Hook"
            exit 0
          fi
          HTTP_CODE=$(curl -s -o /tmp/render_response.json -w "%{http_code}" -X POST "$HOOK_URL")
          echo "Render HTTP response: $HTTP_CODE"
          cat /tmp/render_response.json || true
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "[OK] Render deploy triggered successfully"
          else
            echo "[WARN] Unexpected Render response: $HTTP_CODE"
          fi

      - name: Workflow Summary Output
        run: |
          echo "### 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow:** Build and Deploy to Azure & Render" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Target:** Azure Static Web Apps" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Target:** Render Web Service" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Triggered Successfully ✅" >> $GITHUB_STEP_SUMMARY
